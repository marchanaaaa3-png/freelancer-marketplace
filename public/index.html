<!DOCTYPE html>
<html>
<head>
  <title>Freelancer Marketplace</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
body{
  font-family:Arial;
}
</style>
</head>
  <body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">
      Freelancer Marketplace 💼
    </a>
  </div>
</nav>

<div class="container mt-3">

  <div id="userBox" class="alert alert-success d-none">
    Logged in as:
    <span id="currentUser"></span>

    <button
      onclick="logout()"
      class="btn btn-sm btn-danger float-end"
    >
      Logout
    </button>
  </div>

</div>

<div class="container">
  <div class="card shadow p-4 mb-5">

  <h2 class="mb-4">User Signup</h2>

  <input
    id="name"
    class="form-control mb-3"
    placeholder="Name"
  >

  <input
    id="email"
    class="form-control mb-3"
    placeholder="Email"
  >

  <input
    id="password"
    type="password"
    class="form-control mb-3"
    placeholder="Password"
  >

  <button
    class="btn btn-success"
    onclick="signup()"
  >
    Signup
  </button>

</div>

  <div class="card shadow p-4 mb-5">
    <input 
      id="title" 
      class="form-control mb-3"
      placeholder="Job Title"
    >

    <textarea 
      id="description" 
      class="form-control mb-3"
      placeholder="Job Description"
    ></textarea>

    <input 
      id="budget" 
      class="form-control mb-3"
      placeholder="Budget"
    >

    <button 
      class="btn btn-primary"
      onclick="addJob()"
    >
      Add Job
    </button>

  </div>

  <h2 class="mb-4">All Jobs</h2>

  <div id="jobs"></div>

</div>

</body>
   


<h1>Freelancer Marketplace 💼</h1>
<script>
async function signup() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const res = await fetch("http://localhost:5000/api/auth/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      email,
      password

    })
  });

  const data = await res.json();

  alert(data.message);
}
const API = "http://localhost:5000/api/jobs";

  async function login() {

  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  const res = await fetch(
    "http://localhost:5000/api/auth/login",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await res.json();

  alert(data.message);

  if (data.token) {

  localStorage.setItem(
    "token",
    data.token
  );

  localStorage.setItem(
    "email",
    email
  );

  checkLogin();
}
  }

// Load Jobs
async function loadJobs() {
  const res = await fetch(API);
  const jobs = await res.json();

  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobs.forEach(job => {
    const div = document.createElement("div");

    div.className = "card shadow-sm p-3 mb-3";

    div.innerHTML = `
      <h4>${job.title}</h4>
      <p>${job.description}</p>
      <h6>💰 Budget: ₹${job.budget}</h6>

      <button class="btn btn-danger"
        onclick="deleteJob('${job._id}')">
        Delete
      </button>
    `;

    container.appendChild(div);
  });
}

// Add Job
async function addJob() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const budget = document.getElementById("budget").value;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      description,
      budget
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("description").value = "";
  document.getElementById("budget").value = "";

  loadJobs();
}

// Delete Job
async function deleteJob(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });
  async function signup() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(
    "http://localhost:5000/api/auth/signup",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password
      })
    }
  );

  const data = await res.json();

  alert(data.message);
}


  loadJobs();
}
function checkLogin() {

  const token =
    localStorage.getItem("token");

  const email =
    localStorage.getItem("email");

  if (token) {

    document
      .getElementById("userBox")
      .classList.remove("d-none");

    document
      .getElementById("currentUser")
      .innerText = email;
  }
}
function logout() {

  localStorage.removeItem("token");

  localStorage.removeItem("email");

  location.reload();
}
checkLogin();
// Initial Load
loadJobs();
</script>
<button onclick="signup()" class="btn btn-success w-100">
  Signup
</button>
</body>
</html>
